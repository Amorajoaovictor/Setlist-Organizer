openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Band Setlist Organizer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: setlists
    description: Setlist management
  - name: deezer
    description: Deezer track search
  - name: lyrics
    description: Synced lyrics search and storage
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /setlists:
    get:
      operationId: listSetlists
      tags: [setlists]
      summary: List all setlists
      responses:
        "200":
          description: List of setlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setlist"
    post:
      operationId: createSetlist
      tags: [setlists]
      summary: Create a new setlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSetlistInput"
      responses:
        "201":
          description: Created setlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setlist"

  /setlists/{id}:
    get:
      operationId: getSetlist
      tags: [setlists]
      summary: Get a setlist with its songs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Setlist with songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetlistWithSongs"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSetlist
      tags: [setlists]
      summary: Update setlist name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSetlistInput"
      responses:
        "200":
          description: Updated setlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setlist"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSetlist
      tags: [setlists]
      summary: Delete a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /setlists/{id}/songs:
    post:
      operationId: addSongToSetlist
      tags: [setlists]
      summary: Add a song to a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSongInput"
      responses:
        "201":
          description: Added song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetlistSong"

  /setlists/{id}/songs/{songId}:
    delete:
      operationId: removeSongFromSetlist
      tags: [setlists]
      summary: Remove a song from a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /setlists/{id}/songs/{songId}/lyrics:
    get:
      operationId: getSongLyrics
      tags: [lyrics]
      summary: Get stored lyrics for a setlist song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stored lyrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongLyrics"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: saveSongLyrics
      tags: [lyrics]
      summary: Save manual or LRCLIB-derived synced lyrics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSongLyricsInput"
      responses:
        "200":
          description: Saved lyrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongLyrics"
        "404":
          description: Song not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /setlists/{id}/songs/{songId}/lyrics/search:
    post:
      operationId: searchLrclibLyrics
      tags: [lyrics]
      summary: Fetch lyrics and timestamps from LRCLIB for a setlist song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: LRCLIB lyrics result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LrclibLyricsResult"
        "404":
          description: Lyrics not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /setlists/{id}/songs/reorder:
    put:
      operationId: reorderSetlistSongs
      tags: [setlists]
      summary: Reorder songs in a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderSongsInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /deezer/search:
    get:
      operationId: searchDeezerTracks
      tags: [deezer]
      summary: Search for tracks on Deezer
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeezerTrack"
        "500":
          description: Deezer API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Setlist:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        totalDurationMs:
          type: integer
        songCount:
          type: integer
      required:
        - id
        - name
        - createdAt
        - totalDurationMs
        - songCount

    SetlistWithSongs:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        songs:
          type: array
          items:
            $ref: "#/components/schemas/SetlistSong"
      required:
        - id
        - name
        - createdAt
        - songs

    SetlistSong:
      type: object
      properties:
        id:
          type: integer
        setlistId:
          type: integer
        position:
          type: integer
        title:
          type: string
        artist:
          type: string
        durationMs:
          type: integer
        bpm:
          type:
            - integer
            - "null"
        deezerId:
          type: string
        spotifyId:
          type: string
        albumArt:
          type:
            - string
            - "null"
      required:
        - id
        - setlistId
        - position
        - title
        - artist
        - durationMs

    CreateSetlistInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    UpdateSetlistInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    AddSongInput:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        durationMs:
          type: integer
        bpm:
          type:
            - integer
            - "null"
        deezerId:
          type: string
        spotifyId:
          type: string
        albumArt:
          type:
            - string
            - "null"
      required:
        - title
        - artist
        - durationMs

    ReorderSongsInput:
      type: object
      properties:
        songIds:
          type: array
          items:
            type: integer
          description: Song IDs in the new order
      required:
        - songIds

    DeezerTrack:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        artist:
          type: string
        durationMs:
          type: integer
        bpm:
          type:
            - integer
            - "null"
        albumArt:
          type:
            - string
            - "null"
        album:
          type: string
      required:
        - id
        - title
        - artist
        - durationMs

    LyricLine:
      type: object
      properties:
        index:
          type: integer
        text:
          type: string
        startMs:
          type:
            - integer
            - "null"
          description: Milliseconds from audio start. Null for unsynced/manual draft lines.
      required:
        - index
        - text
        - startMs

    SongLyrics:
      type: object
      properties:
        id:
          type: integer
        songId:
          type: integer
        source:
          type: string
          enum: [lrclib, manual]
        lrclibId:
          type:
            - integer
            - "null"
        plainLyrics:
          type: string
        syncedLyrics:
          type:
            - string
            - "null"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/LyricLine"
        bpm:
          type:
            - integer
            - "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - songId
        - source
        - lrclibId
        - plainLyrics
        - syncedLyrics
        - lines
        - bpm
        - createdAt
        - updatedAt

    SaveSongLyricsInput:
      type: object
      properties:
        source:
          type: string
          enum: [lrclib, manual]
        lrclibId:
          type:
            - integer
            - "null"
        plainLyrics:
          type: string
        syncedLyrics:
          type:
            - string
            - "null"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/LyricLine"
        bpm:
          type:
            - integer
            - "null"
      required:
        - source
        - plainLyrics

    LrclibLyricsResult:
      type: object
      properties:
        id:
          type: integer
        trackName:
          type: string
        artistName:
          type: string
        albumName:
          type:
            - string
            - "null"
        duration:
          type:
            - integer
            - "null"
        instrumental:
          type: boolean
        plainLyrics:
          type: string
        syncedLyrics:
          type:
            - string
            - "null"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/LyricLine"
      required:
        - id
        - trackName
        - artistName
        - albumName
        - duration
        - instrumental
        - plainLyrics
        - syncedLyrics
        - lines
