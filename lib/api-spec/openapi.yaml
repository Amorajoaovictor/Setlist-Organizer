openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Band Setlist Organizer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: setlists
    description: Setlist management
  - name: spotify
    description: Spotify track search
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /setlists:
    get:
      operationId: listSetlists
      tags: [setlists]
      summary: List all setlists
      responses:
        "200":
          description: List of setlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setlist"
    post:
      operationId: createSetlist
      tags: [setlists]
      summary: Create a new setlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSetlistInput"
      responses:
        "201":
          description: Created setlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setlist"

  /setlists/{id}:
    get:
      operationId: getSetlist
      tags: [setlists]
      summary: Get a setlist with its songs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Setlist with songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetlistWithSongs"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSetlist
      tags: [setlists]
      summary: Update setlist name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSetlistInput"
      responses:
        "200":
          description: Updated setlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setlist"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSetlist
      tags: [setlists]
      summary: Delete a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /setlists/{id}/songs:
    post:
      operationId: addSongToSetlist
      tags: [setlists]
      summary: Add a song to a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSongInput"
      responses:
        "201":
          description: Added song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetlistSong"

  /setlists/{id}/songs/{songId}:
    delete:
      operationId: removeSongFromSetlist
      tags: [setlists]
      summary: Remove a song from a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /setlists/{id}/songs/reorder:
    put:
      operationId: reorderSetlistSongs
      tags: [setlists]
      summary: Reorder songs in a setlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderSongsInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /spotify/search:
    get:
      operationId: searchSpotifyTracks
      tags: [spotify]
      summary: Search for tracks on Spotify
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpotifyTrack"
        "500":
          description: Spotify API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Setlist:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        totalDurationMs:
          type: integer
        songCount:
          type: integer
      required:
        - id
        - name
        - createdAt
        - totalDurationMs
        - songCount

    SetlistWithSongs:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        songs:
          type: array
          items:
            $ref: "#/components/schemas/SetlistSong"
      required:
        - id
        - name
        - createdAt
        - songs

    SetlistSong:
      type: object
      properties:
        id:
          type: integer
        setlistId:
          type: integer
        position:
          type: integer
        title:
          type: string
        artist:
          type: string
        durationMs:
          type: integer
        spotifyId:
          type: string
        albumArt:
          type: string
      required:
        - id
        - setlistId
        - position
        - title
        - artist
        - durationMs

    CreateSetlistInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    UpdateSetlistInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    AddSongInput:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        durationMs:
          type: integer
        spotifyId:
          type: string
        albumArt:
          type: string
      required:
        - title
        - artist
        - durationMs

    ReorderSongsInput:
      type: object
      properties:
        songIds:
          type: array
          items:
            type: integer
          description: Song IDs in the new order
      required:
        - songIds

    SpotifyTrack:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        artist:
          type: string
        durationMs:
          type: integer
        albumArt:
          type: string
        album:
          type: string
      required:
        - id
        - title
        - artist
        - durationMs

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — Bearer <sid>.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
